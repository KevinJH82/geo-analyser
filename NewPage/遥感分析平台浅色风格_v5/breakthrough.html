<div class="flex gap-12">
<div>

<div>

<div class="space-y-4">
<div class="flex items-center justify-between p-3 bg-slate-50 rounded-xl">
<div class="flex items-center gap-3">

</div>

<div class="flex items-center justify-between p-3 hover:bg-slate-50 transition-colors cursor-pointer rounded-xl">

<span class="text-xs font-bold">B-112 次生晕扩散区</span>
</div>

<script>
        const canvas = echarts.init(document.getElementById('breakthroughCanvas'));
        const density = echarts.init(document.getElementById('densityChart'));

        const data = [];
        for(let i=0; i<100; i++) {
            data.push([Math.random()*10, Math.random()*10, Math.random()*50]);
        }

        canvas.setOption({
            tooltip: {},
            xAxis: { show: false, min: 0, max: 10 },
            yAxis: { show: false, min: 0, max: 10 },
            series: [{
                type: 'scatter',
                data: data,
                symbolSize: function(d) { return d[2]; },
                itemStyle: {
                    color: '#f43f5e',
                    opacity: 0.1,
                    borderColor: '#f43f5e',
                    borderWidth: 1
                },
                animationDelay: function (idx) { return idx * 10; }
            }]
        });

        density.setOption({
            tooltip: { trigger: 'item' },
            series: [{
                type: 'pie',
                radius: ['40%', '70%'],
                avoidLabelOverlap: false,
                itemStyle: { borderRadius: 10, borderColor: '#fff', borderWidth: 2 },
                label: { show: false },
                data: [
                    { value: 1048, name: '铁氧化物', itemStyle: { color: '#e11d48' } },
                    { value: 735, name: 'Al-OH', itemStyle: { color: '#f43f5e' } },
                    { value: 580, name: 'Mg-OH', itemStyle: { color: '#fda4af' } }
                ]
            }]
        });

        window.addEventListener('resize', () => {
            canvas.resize();
            density.resize();
        });
    </script>
