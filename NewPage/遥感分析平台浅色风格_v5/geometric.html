</a>
<div class="hidden md:flex items-center gap-6 text-sm font-medium">
<div class="relative nav-dropdown py-4 group">
<a class="text-slate-900 flex items-center gap-1 transition-colors" href="data_preprocessing.html">
                        数据预处理 <iconify-icon class="text-xs" icon="lucide:chevron-down"></iconify-icon>

<div class="absolute top-14 left-0 w-48 bg-white border border-slate-100 shadow-xl rounded-xl p-2 hidden group-hover:block z-50">

<a class="text-slate-500 hover:text-slate-900 transition-colors" href="alteration.html">蚀变异常检测</a>

<main class="pt-24 pb-20 px-8 max-w-[800px] mx-auto">

<iconify-icon icon="lucide:arrow-left"></iconify-icon>
</a>
<div>
<h1 class="text-2xl font-bold tracking-tight">📐 几何校正</h1>
<nav class="flex text-xs text-slate-400 mt-1">

<span class="mx-2">/</span>
<span class="text-slate-600">几何校正</span>
</nav>

<section class="space-y-8">
<div class="p-8 border thin-border rounded-3xl bg-white space-y-6">
<div class="space-y-2">
<label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">重采样算法</label>
<select class="w-full p-3 border thin-border rounded-xl text-xs bg-white outline-none">
<option>最近邻内插法 (Nearest Neighbor)</option>
<option>双线性内插法 (Bilinear)</option>
<option>三次卷积内插法 (Cubic)</option>
</select>
</div>
<div class="space-y-2 pt-4 border-t thin-border">
<label class="text-[10px] font-bold text-slate-400 uppercase">特征配准参考图</label>
<div class="border-2 border-dashed border-slate-100 rounded-xl p-8 flex flex-col items-center justify-center text-center cursor-pointer hover:border-slate-300 transition-colors">
<iconify-icon class="text-3xl text-slate-200 mb-2" icon="lucide:file-image"></iconify-icon>
<p class="text-xs font-bold">点击或拖拽参考图至此处</p>
<p class="text-[10px] text-slate-400 mt-1">支持：Geotiff / Google Satellite</p>
</div>
</div>
<div class="flex items-center justify-between p-4 border thin-border rounded-xl">
<div class="flex items-center gap-2">
<iconify-icon class="text-emerald-500" icon="lucide:check-circle-2"></iconify-icon>
<span class="text-xs font-bold">自动提取 GCP 控制点</span>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox"/>
<div class="w-9 h-5 bg-slate-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-black"></div>
</label>
</div>
<button class="w-full py-4 bg-black text-white rounded-xl text-sm font-bold hover:bg-slate-800 transition-all shadow-lg shadow-slate-200">
                    开始几何校正
                </button>
</div>
</section>
<!-- 结果预览 -->
<section class="mt-12 space-y-4">
<h3 class="text-sm font-bold text-slate-900">结果预览</h3>
<div class="aspect-video bg-slate-50 border thin-border rounded-2xl overflow-hidden relative">
<img alt="Geometric correction preview" class="w-full h-full object-cover opacity-50" src="/agent-py/static/source/images/placeholder.svg"/>
<div class="absolute inset-0 flex items-center justify-center text-slate-400 text-xs">
                    等待任务执行...
                </div>
</div>
</section>
